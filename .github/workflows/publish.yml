name: Build and Publish

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish package to GitHub Packages"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: read
  packages: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://npm.pkg.github.com
          scope: "@bjalon"
          cache: npm

      - name: Install dependencies
        run: npm ci
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Audit high severity vulnerabilities
        run: npm run audit

      - name: Test built package and Vite consumer
        run: npm run test:package

      - name: Build integrated example
        run: npm run build:example

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: form-runtime-dist
          path: dist

      - name: Upload integrated example artifact
        uses: actions/upload-artifact@v4
        with:
          name: form-runtime-integrated-example
          path: dist-example

  publish:
    name: Publish to GitHub Packages
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.publish == 'true')
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate package scope
        shell: bash
        run: |
          set -euo pipefail

          PACKAGE_SCOPE="$(node -p "require('./package.json').name.match(/^@([^/]+)\//)?.[1] ?? ''")"
          if [ "${PACKAGE_SCOPE}" != "${GITHUB_REPOSITORY_OWNER}" ]; then
            echo "::error::GitHub Packages npm requires the package scope to match the repository owner when publishing with GITHUB_TOKEN. Current package scope: @${PACKAGE_SCOPE}; repository owner: ${GITHUB_REPOSITORY_OWNER}."
            exit 1
          fi

          echo "Package scope @${PACKAGE_SCOPE} matches repository owner ${GITHUB_REPOSITORY_OWNER}."

      - name: Setup Node for GitHub Packages
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://npm.pkg.github.com
          scope: "@bjalon"
          cache: npm

      - name: Read package metadata
        id: package
        shell: bash
        run: |
          set -euo pipefail

          echo "name=$(node -p "require('./package.json').name")" >> "${GITHUB_OUTPUT}"
          echo "version=$(node -p "require('./package.json').version")" >> "${GITHUB_OUTPUT}"

      - name: Check published version
        id: published
        shell: bash
        run: |
          set -euo pipefail

          PACKAGE_SPEC="${{ steps.package.outputs.name }}@${{ steps.package.outputs.version }}"
          if npm view "${PACKAGE_SPEC}" version --registry=https://npm.pkg.github.com >/tmp/published-version.txt 2>/tmp/npm-view-error.log; then
            echo "exists=true" >> "${GITHUB_OUTPUT}"
            echo "Package ${PACKAGE_SPEC} is already published. Skipping npm publish."
          else
            echo "exists=false" >> "${GITHUB_OUTPUT}"
            echo "Package ${PACKAGE_SPEC} is not published yet."
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dependencies
        if: steps.published.outputs.exists != 'true'
        run: npm ci
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build package
        if: steps.published.outputs.exists != 'true'
        run: npm run build

      - name: Publish package
        if: steps.published.outputs.exists != 'true'
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
